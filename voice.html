<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Andrea IA"/>
<link rel="manifest" href="manifest.json"/>
<title>Andrea IA</title>
<script src="https://js.puter.com/v2/"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --surface2:#18181f;
  --border:#1e1e2a;
  --accent:#7c6af7;
  --accent2:#a78bfa;
  --accent-glow:rgba(124,106,247,0.22);
  --accent-glow2:rgba(124,106,247,0.07);
  --red:#f87171;
  --green:#4ade80;
  --text:#e2e8f0;
  --text-dim:#64748b;
  --text-muted:#2d3748;
  --white:#fff;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100dvh;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% -10%, rgba(124,106,247,.1) 0%, transparent 65%);
  pointer-events:none;z-index:0;
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;flex-shrink:0;position:relative;z-index:10;
}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#6366f1);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px var(--accent-glow);
}
.logo-mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.logo-info{}
.logo-name{font-size:14px;font-weight:700;color:var(--white);line-height:1}
.logo-brand{font-size:10px;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase}
.mode-toggle{
  display:flex;background:var(--surface);
  border:1px solid var(--border);border-radius:9px;padding:3px;gap:3px;
}
.mode-btn{
  padding:5px 13px;border-radius:7px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;background:none;color:var(--text-dim);
  display:flex;align-items:center;gap:5px;
}
.mode-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mode-btn.active{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--accent-glow)}

/* ── VOICE MODE ── */
#voiceMode{display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.voice-panel{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;padding:16px 24px;
}
/* Orbe */
.orb-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.rings{position:absolute;width:220px;height:220px;pointer-events:none}
.ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(124,106,247,.12);
  animation:rexpand 3.5s ease-out infinite;
}
.ring:nth-child(1){inset:30px;animation-delay:0s}
.ring:nth-child(2){inset:14px;animation-delay:.6s}
.ring:nth-child(3){inset:-2px;animation-delay:1.2s}
@keyframes rexpand{0%{opacity:.7;transform:scale(.85)}100%{opacity:0;transform:scale(1.25)}}

.voice-orb{
  width:136px;height:136px;border-radius:50%;
  background:var(--surface2);
  border:2px solid rgba(124,106,247,.18);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .35s;position:relative;z-index:2;
  overflow:hidden;
}
.voice-orb::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.06), transparent 60%);
}
.voice-orb:hover{border-color:rgba(124,106,247,.5);box-shadow:0 0 30px var(--accent-glow)}
.voice-orb.listening{
  border-color:var(--red);
  box-shadow:0 0 0 6px rgba(248,113,113,.1),0 0 35px rgba(248,113,113,.25);
  animation:lpulse 1.1s ease-in-out infinite;
}
.voice-orb.speaking{
  border-color:var(--green);
  box-shadow:0 0 0 6px rgba(74,222,128,.08),0 0 35px rgba(74,222,128,.2);
  animation:spulse .85s ease-in-out infinite;
}
.voice-orb.thinking{
  border-color:var(--accent2);
  box-shadow:0 0 0 6px var(--accent-glow2),0 0 35px var(--accent-glow);
  animation:tpulse 1.5s ease-in-out infinite;
}
@keyframes lpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
@keyframes spulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.orb-img{width:90px;height:90px;border-radius:50%;object-fit:cover}

/* Waveform bars (solo visual durante speaking) */
.waveform{display:flex;align-items:center;gap:3px;height:28px;opacity:0;transition:opacity .3s}
.waveform.active{opacity:1}
.bar{width:3px;border-radius:3px;background:var(--green);animation:wave 1s ease-in-out infinite}
.bar:nth-child(1){height:8px;animation-delay:0s}
.bar:nth-child(2){height:18px;animation-delay:.1s}
.bar:nth-child(3){height:24px;animation-delay:.2s}
.bar:nth-child(4){height:14px;animation-delay:.3s}
.bar:nth-child(5){height:20px;animation-delay:.4s}
.bar:nth-child(6){height:10px;animation-delay:.5s}
.bar:nth-child(7){height:16px;animation-delay:.15s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.7)}}

.voice-label{
  font-size:15px;font-weight:700;color:var(--white);
  text-align:center;min-height:22px;
}
.voice-sub{font-size:12px;color:var(--text-dim);text-align:center;min-height:16px}

/* Mic button */
.mic-btn{
  width:62px;height:62px;border-radius:50%;
  background:linear-gradient(145deg,var(--accent),#5b55d6);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 22px var(--accent-glow);transition:all .2s;
}
.mic-btn:hover{transform:scale(1.07);box-shadow:0 6px 30px rgba(124,106,247,.5)}
.mic-btn:active{transform:scale(.94)}
.mic-btn.listening{background:linear-gradient(145deg,var(--red),#dc2626)}
.mic-btn svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Voice transcript */
.voice-log{
  max-height:160px;overflow-y:auto;
  padding:0 16px 12px;display:flex;flex-direction:column;gap:8px;
}
.voice-log::-webkit-scrollbar{width:0}

/* ── CHAT MODE ── */
#chatMode{display:none;flex-direction:column;flex:1;overflow:hidden}
.messages{
  flex:1;overflow-y:auto;
  padding:14px 18px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:0}
.welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;text-align:center;padding:24px;
}
.w-orb{
  width:88px;height:88px;border-radius:50%;overflow:hidden;
  border:2px solid rgba(124,106,247,.3);
  margin-bottom:18px;
  box-shadow:0 0 0 10px var(--accent-glow2),0 0 50px var(--accent-glow);
  animation:glow 3.5s ease-in-out infinite;
}
@keyframes glow{0%,100%{box-shadow:0 0 0 10px var(--accent-glow2),0 0 40px var(--accent-glow)}50%{box-shadow:0 0 0 18px rgba(124,106,247,.03),0 0 70px rgba(124,106,247,.22)}}
.w-orb img{width:100%;height:100%;object-fit:cover}
.welcome h2{font-size:21px;font-weight:800;color:var(--white);margin-bottom:6px}
.welcome h2 span{color:var(--accent2)}
.welcome p{font-size:13px;color:var(--text-dim);line-height:1.65;max-width:250px}

/* Bubbles */
.msg{display:flex;flex-direction:column;max-width:84%;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.agent{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.user .bubble{
  background:linear-gradient(135deg,var(--accent),#5b55d6);
  color:#fff;border-bottom-right-radius:4px;
  box-shadow:0 3px 16px rgba(124,106,247,.28);
}
.msg.agent .bubble{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-bottom-left-radius:4px;
}
.msg-time{font-size:10px;color:var(--text-muted);margin-top:3px;padding:0 3px}

/* Typing */
.typing-wrap{display:flex;align-items:center;gap:4px;padding:12px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);opacity:.4;animation:db .9s infinite}
.dot:nth-child(2){animation-delay:.16s}.dot:nth-child(3){animation-delay:.32s}
@keyframes db{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* Bottom bar */
.bottom-bar{padding:10px 14px 18px;flex-shrink:0;position:relative;z-index:10}
.input-wrap{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:22px;padding:8px 8px 8px 16px;transition:border-color .2s;
}
.input-wrap:focus-within{border-color:rgba(124,106,247,.45)}
#userInput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;resize:none;
  max-height:100px;font-family:inherit;line-height:1.5;padding:4px 0;
}
#userInput::placeholder{color:var(--text-muted)}
.mini-mic{
  width:34px;height:34px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;
}
.mini-mic svg{width:15px;height:15px;stroke:var(--text-dim);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.mini-mic:hover svg,.mini-mic.rec svg{stroke:var(--red)}
.mini-mic.rec{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.4)}
.send-btn{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#5b55d6);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 10px var(--accent-glow);transition:all .2s;
}
.send-btn:hover{transform:scale(1.06)}.send-btn:active{transform:scale(.94)}
.send-btn:disabled{opacity:.3;cursor:default;transform:none}
.send-btn svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

@media(min-width:600px){body{max-width:420px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <!-- Ícono robot minimalista -->
      <svg viewBox="0 0 24 24"><rect x="5" y="8" width="14" height="10" rx="3"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/><circle cx="9" cy="13" r="1.5" fill="#fff" stroke="none"/><circle cx="15" cy="13" r="1.5" fill="#fff" stroke="none"/><path d="M9 17h6"/></svg>
    </div>
    <div class="logo-info">
      <div class="logo-name">Andrea IA</div>
      <div class="logo-brand">DGTech</div>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnVoz" onclick="setMode('voice')">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      Voz
    </button>
    <button class="mode-btn" id="btnChat" onclick="setMode('chat')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Chat
    </button>
  </div>
</div>

<!-- ══ VOICE MODE ══ -->
<div id="voiceMode">
  <div class="voice-panel">

    <div class="orb-wrap">
      <div class="rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
      <div class="voice-orb" id="voiceOrb" onclick="toggleListen()">
        <img class="orb-img"
          src="https://media.base44.com/images/public/69d2bb91c971dceaa292f823/17e19110b_generated_image.png"
          alt="Andrea"/>
      </div>
    </div>

    <div class="waveform" id="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="voice-label" id="voiceLabel">Toca para hablar</div>
    <div class="voice-sub" id="voiceSub">Andrea responde en voz real</div>

    <button class="mic-btn" id="micBtn" onclick="toggleListen()">
      <!-- Ícono mic minimalista -->
      <svg id="micIcon" viewBox="0 0 24 24">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>

  </div>

  <!-- Transcripción en voz -->
  <div class="voice-log" id="voiceLog"></div>
</div>

<!-- ══ CHAT MODE ══ -->
<div id="chatMode">
  <div class="messages" id="chatMsgs">
    <div class="welcome" id="chatWelcome">
      <div class="w-orb">
        <img src="https://media.base44.com/images/public/69d2bb91c971dceaa292f823/17e19110b_generated_image.png" alt="Andrea"/>
      </div>
      <h2>Hola, soy <span>Andrea</span></h2>
      <p>Tu asistente inteligente. Escríbeme o usa el modo Voz para hablar conmigo.</p>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Escríbele a Andrea..." rows="1" maxlength="2000"></textarea>
      <button class="mini-mic" id="miniMic" onclick="quickVoice()" title="Dictar">
        <svg viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" onclick="sendChat()">
        <!-- Ícono send minimalista -->
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  CONFIGURACIÓN
// ════════════════════════════════════════
const SYSTEM_PROMPT = `Eres Andrea, una asistente inteligente de DGTech.
Eres amable, concisa y profesional. Siempre respondes en español latino.
Ayudas con planificación, documentos, consultas empresariales, facturación y más.
Cuando respondas en voz, sé breve y natural — como si hablaras con una persona.`;

const VOICE_CONFIG = {
  provider: 'aws-polly',
  voice: 'Lupe',
  engine: 'neural'
};

// ════════════════════════════════════════
//  ESTADO
// ════════════════════════════════════════
let chatHistory = [];
let busy = false;
let isListening = false;
let mediaRecorder = null;
let audioChunks = [];
let micStream = null;
let miniRecorder = null;
let miniChunks = [];
let miniStream = null;
let miniActive = false;
let currentAudio = null;

// ════════════════════════════════════════
//  MODO
// ════════════════════════════════════════
function setMode(m) {
  const isVoice = m === 'voice';
  document.getElementById('voiceMode').style.display = isVoice ? 'flex' : 'none';
  document.getElementById('chatMode').style.display = isVoice ? 'none' : 'flex';
  document.getElementById('btnVoz').classList.toggle('active', isVoice);
  document.getElementById('btnChat').classList.toggle('active', !isVoice);
}

// ════════════════════════════════════════
//  ESTADO VISUAL DEL ORBE
// ════════════════════════════════════════
function setOrbState(state) {
  const orb = document.getElementById('voiceOrb');
  const label = document.getElementById('voiceLabel');
  const sub = document.getElementById('voiceSub');
  const btn = document.getElementById('micBtn');
  const icon = document.getElementById('micIcon');
  const wave = document.getElementById('waveform');

  orb.className = 'voice-orb';
  wave.classList.remove('active');

  if (state === 'idle') {
    label.textContent = 'Toca para hablar';
    sub.textContent = 'Andrea responde en voz real';
    icon.innerHTML = `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
    btn.className = 'mic-btn';
  } else if (state === 'listening') {
    orb.classList.add('listening');
    label.textContent = 'Escuchando…';
    sub.textContent = 'Habla ahora · Toca para detener';
    icon.innerHTML = `<rect x="8" y="8" width="8" height="8" rx="1"/>`;
    btn.className = 'mic-btn listening';
  } else if (state === 'thinking') {
    orb.classList.add('thinking');
    label.textContent = 'Procesando…';
    sub.textContent = 'Andrea está pensando';
    icon.innerHTML = `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
    btn.className = 'mic-btn';
  } else if (state === 'speaking') {
    orb.classList.add('speaking');
    wave.classList.add('active');
    label.textContent = 'Respondiendo…';
    sub.textContent = 'Toca para interrumpir';
    icon.innerHTML = `<rect x="8" y="8" width="8" height="8" rx="1"/>`;
    btn.className = 'mic-btn listening';
  }
}

// ════════════════════════════════════════
//  MICRÓFONO
// ════════════════════════════════════════
function getMimeType() {
  for (const t of ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function toggleListen() {
  if (busy && !isListening) return;

  // Si está hablando Andrea → interrumpir
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    busy = false;
    setOrbState('idle');
    return;
  }

  if (!isListening) {
    await startListening();
  } else {
    await stopListening();
  }
}

async function startListening() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(micStream, { mimeType: getMimeType() });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);
    isListening = true;
    setOrbState('listening');
  } catch (err) {
    setOrbState('idle');
    addVoiceLog('agent', '⚠️ Necesito permiso del micrófono para escucharte.');
  }
}

async function stopListening() {
  if (!mediaRecorder) return;
  isListening = false;
  busy = true;
  setOrbState('thinking');

  mediaRecorder.stop();
  micStream.getTracks().forEach(t => t.stop());

  mediaRecorder.onstop = async () => {
    try {
      // 1 ── Voz → Texto  (Puter.js / OpenAI Whisper — GRATIS)
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const dataUrl = await blobToDataUrl(blob);
      const result = await puter.ai.speech2txt(dataUrl, { language: 'es' });
      const userText = (typeof result === 'string' ? result : result?.text || '').trim();

      if (!userText) {
        setOrbState('idle');
        busy = false;
        return;
      }

      addVoiceLog('user', userText);
      chatHistory.push({ role: 'user', content: userText });

      // 2 ── Texto → IA  (Puter.js / Gemini Flash — GRATIS)
      const aiResp = await puter.ai.chat(userText, {
        model: 'google/gemini-2.0-flash',
        system_prompt: SYSTEM_PROMPT,
        // Pasamos los últimos 6 mensajes como contexto
        messages: buildMessages(userText)
      });

      const reply = extractText(aiResp);
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);

      addVoiceLog('agent', reply);

      // 3 ── IA → Voz  (Puter.js / AWS Polly Lupe Neural — GRATIS)
      setOrbState('speaking');
      const audio = await puter.ai.txt2speech(reply, VOICE_CONFIG);
      currentAudio = audio;
      audio.play();
      audio.onended = () => {
        currentAudio = null;
        busy = false;
        setOrbState('idle');
      };

    } catch (err) {
      console.error(err);
      addVoiceLog('agent', '⚠️ Hubo un error. Intenta de nuevo.');
      busy = false;
      setOrbState('idle');
    }
  };
}

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function blobToDataUrl(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function buildMessages(currentText) {
  // Puter.js chat acepta array de mensajes tipo OpenAI
  const msgs = [];
  const hist = chatHistory.slice(-8); // últimos 8 sin el actual
  for (const m of hist) {
    msgs.push({ role: m.role, content: m.content });
  }
  return msgs;
}

function extractText(resp) {
  if (typeof resp === 'string') return resp;
  // Estructura OpenAI
  if (resp?.message?.content) {
    const c = resp.message.content;
    if (typeof c === 'string') return c;
    if (Array.isArray(c)) return c.map(p => p.text || '').join('');
  }
  // Estructura Gemini / genérica
  if (resp?.text) return resp.text;
  if (resp?.content) return resp.content;
  return String(resp);
}

function timeStr() {
  return new Date().toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' });
}

function addVoiceLog(role, text) {
  const log = document.getElementById('voiceLog');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  const short = text.length > 130 ? text.slice(0, 130) + '…' : text;
  d.innerHTML = `<div class="bubble">${short}</div>`;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

// ════════════════════════════════════════
//  CHAT TEXT
// ════════════════════════════════════════
const txtInput = document.getElementById('userInput');
txtInput.addEventListener('input', () => {
  txtInput.style.height = 'auto';
  txtInput.style.height = Math.min(txtInput.scrollHeight, 100) + 'px';
});
txtInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

function addChatMsg(role, text) {
  document.getElementById('chatWelcome').style.display = 'none';
  const msgs = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br/>')}</div><div class="msg-time">${timeStr()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMsgs');
  const d = document.createElement('div');
  d.className = 'msg agent'; d.id = 'typing';
  d.innerHTML = `<div class="typing-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function sendChat() {
  const text = txtInput.value.trim();
  if (!text || busy) return;
  busy = true; txtInput.value = ''; txtInput.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  addChatMsg('user', text); showTyping();
  chatHistory.push({ role: 'user', content: text });

  try {
    const resp = await puter.ai.chat(text, {
      model: 'google/gemini-2.0-flash',
      system_prompt: SYSTEM_PROMPT,
      messages: buildMessages(text)
    });
    removeTyping();
    const reply = extractText(resp);
    addChatMsg('agent', reply);
    chatHistory.push({ role: 'assistant', content: reply });
    if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);
  } catch (err) {
    removeTyping();
    addChatMsg('agent', '⚠️ Ocurrió un error. Intenta de nuevo.');
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  txtInput.focus();
}

// ════════════════════════════════════════
//  DICTADO RÁPIDO EN CHAT
// ════════════════════════════════════════
async function quickVoice() {
  const btn = document.getElementById('miniMic');
  if (!miniActive) {
    miniStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    miniRecorder = new MediaRecorder(miniStream, { mimeType: getMimeType() });
    miniChunks = [];
    miniRecorder.ondataavailable = e => { if (e.data.size > 0) miniChunks.push(e.data); };
    miniRecorder.start(100);
    miniActive = true;
    btn.classList.add('rec');
  } else {
    miniActive = false;
    btn.classList.remove('rec');
    miniRecorder.stop();
    miniStream.getTracks().forEach(t => t.stop());
    miniRecorder.onstop = async () => {
      try {
        const blob = new Blob(miniChunks, { type: miniRecorder.mimeType || 'audio/webm' });
        const dataUrl = await blobToDataUrl(blob);
        const result = await puter.ai.speech2txt(dataUrl, { language: 'es' });
        const text = (typeof result === 'string' ? result : result?.text || '').trim();
        if (text) { txtInput.value = text; txtInput.style.height = 'auto'; txtInput.style.height = Math.min(txtInput.scrollHeight, 100) + 'px'; }
      } catch (e) { console.error(e); }
    };
  }
}

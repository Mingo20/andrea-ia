<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Andrea IA"/>
<link rel="manifest" href="manifest.json"/>
<title>Andrea IA — Voz</title>
<script src="https://js.puter.com/v2/"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --surface:#12121a;
  --surface2:#1a1a26;
  --border:#1e1e2e;
  --accent:#7c6af7;
  --accent2:#a78bfa;
  --accent-glow:rgba(124,106,247,0.2);
  --accent-glow2:rgba(124,106,247,0.06);
  --red:#f87171;
  --green:#4ade80;
  --text:#e2e8f0;
  --text-dim:#64748b;
  --text-muted:#334155;
  --white:#fff;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100dvh;
  position:relative;
}

/* BG GRADIENT */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,106,247,.08) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;
  flex-shrink:0;position:relative;z-index:10;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.logo-text{font-size:15px;font-weight:700;color:var(--white);letter-spacing:.5px}
.logo-sub{font-size:11px;color:var(--text-dim);margin-left:2px}
.mode-toggle{
  display:flex;gap:6px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:4px;
}
.mode-btn{
  padding:5px 12px;border-radius:7px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;
  background:none;color:var(--text-dim);
}
.mode-btn.active{background:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-glow)}

/* MESSAGES SCROLL */
.messages{
  flex:1;overflow-y:auto;
  padding:12px 20px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
  position:relative;z-index:1;
}
.messages::-webkit-scrollbar{width:0}

/* WELCOME */
.welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;text-align:center;padding:20px;
}
.welcome-orb{
  width:100px;height:100px;border-radius:50%;
  background:var(--surface2);
  border:2px solid rgba(124,106,247,.3);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  box-shadow:0 0 0 12px var(--accent-glow2),0 0 60px var(--accent-glow);
  animation:orb-idle 4s ease-in-out infinite;
}
@keyframes orb-idle{0%,100%{box-shadow:0 0 0 12px var(--accent-glow2),0 0 40px var(--accent-glow)}50%{box-shadow:0 0 0 20px rgba(124,106,247,.03),0 0 80px rgba(124,106,247,.25)}}
.welcome-orb img{width:72px;height:72px;border-radius:50%;object-fit:cover}
.welcome h2{font-size:22px;font-weight:800;color:var(--white);margin-bottom:6px}
.welcome h2 span{color:var(--accent2)}
.welcome p{font-size:13px;color:var(--text-dim);line-height:1.6;max-width:260px}

/* MSG BUBBLES */
.msg{display:flex;flex-direction:column;max-width:85%;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.agent{align-self:flex-start;align-items:flex-start}
.bubble{padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.user .bubble{
  background:linear-gradient(135deg,var(--accent),#6366f1);
  color:#fff;border-bottom-right-radius:4px;
  box-shadow:0 4px 20px rgba(124,106,247,.3);
}
.msg.agent .bubble{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-bottom-left-radius:4px;
}
.msg-time{font-size:10px;color:var(--text-muted);margin-top:3px;padding:0 3px}

/* TYPING */
.typing-wrap{display:flex;align-items:center;gap:5px;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);opacity:.4;animation:b .9s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* VOICE PANEL */
.voice-panel{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:20px;padding:20px;
  flex:1;position:relative;z-index:1;
}
.voice-orb-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.voice-rings{position:absolute;inset:-30px;border-radius:50%;pointer-events:none}
.ring{
  position:absolute;border-radius:50%;border:1px solid rgba(124,106,247,.15);
  animation:ring-expand 3s ease-out infinite;
}
.ring:nth-child(1){inset:20px;animation-delay:0s}
.ring:nth-child(2){inset:5px;animation-delay:.5s}
.ring:nth-child(3){inset:-10px;animation-delay:1s}
@keyframes ring-expand{0%{opacity:.6;transform:scale(.8)}100%{opacity:0;transform:scale(1.3)}}

.voice-orb{
  width:130px;height:130px;border-radius:50%;
  background:var(--surface2);
  border:2px solid rgba(124,106,247,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
  position:relative;z-index:2;
  box-shadow:0 0 0 0 var(--accent-glow);
}
.voice-orb:hover{border-color:var(--accent);box-shadow:0 0 30px var(--accent-glow)}
.voice-orb.listening{
  border-color:var(--red);
  box-shadow:0 0 0 8px rgba(248,113,113,.12),0 0 40px rgba(248,113,113,.2);
  animation:listen-pulse 1s ease-in-out infinite;
}
.voice-orb.speaking{
  border-color:var(--green);
  box-shadow:0 0 0 8px rgba(74,222,128,.1),0 0 40px rgba(74,222,128,.2);
  animation:speak-pulse 0.8s ease-in-out infinite;
}
@keyframes listen-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes speak-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.voice-orb img{width:88px;height:88px;border-radius:50%;object-fit:cover;transition:all .3s}
.voice-orb.listening img{filter:hue-rotate(140deg) saturate(1.5)}
.voice-orb.speaking img{filter:hue-rotate(100deg) saturate(1.8) brightness(1.1)}

.voice-status{
  font-size:14px;font-weight:600;color:var(--text-dim);
  text-align:center;min-height:20px;transition:all .3s;
}
.voice-status.listening{color:var(--red)}
.voice-status.speaking{color:var(--green)}
.voice-status.thinking{color:var(--accent2)}

.voice-hint{font-size:12px;color:var(--text-muted);text-align:center}

.mic-btn{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#6366f1);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px var(--accent-glow);
  transition:all .2s;
}
.mic-btn:hover{transform:scale(1.06);box-shadow:0 6px 32px rgba(124,106,247,.5)}
.mic-btn:active{transform:scale(.95)}
.mic-btn.listening{background:linear-gradient(135deg,var(--red),#ef4444)}
.mic-btn svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* INPUT PANEL */
.input-panel{flex:1;display:flex;flex-direction:column;position:relative;z-index:1}
.input-msgs{flex:1;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:10px}
.input-msgs::-webkit-scrollbar{width:0}

/* BOTTOM BAR */
.bottom-bar{
  padding:12px 16px 20px;flex-shrink:0;
  position:relative;z-index:10;
}
.input-wrap{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:22px;padding:8px 8px 8px 16px;
  transition:border-color .2s;
}
.input-wrap:focus-within{border-color:rgba(124,106,247,.5)}
#userInput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;resize:none;
  max-height:100px;font-family:inherit;line-height:1.5;padding:4px 0;
}
#userInput::placeholder{color:var(--text-muted)}
.voice-mini-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:all .2s;
}
.voice-mini-btn svg{width:16px;height:16px;stroke:var(--text-dim);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.voice-mini-btn:hover svg{stroke:var(--accent2)}
.voice-mini-btn.recording{background:rgba(248,113,113,.1);border-color:var(--red)}
.voice-mini-btn.recording svg{stroke:var(--red)}
.send-btn{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#6366f1);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 12px var(--accent-glow);transition:all .2s;
}
.send-btn:hover{transform:scale(1.05)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.35;cursor:default;transform:none}
.send-btn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

@media(min-width:600px){
  body{max-width:420px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <span class="logo-text">Andrea IA</span>
      <span class="logo-sub">DGTech</span>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnVoz" onclick="setMode('voice')">🎙️ Voz</button>
    <button class="mode-btn" id="btnChat" onclick="setMode('chat')">💬 Chat</button>
  </div>
</div>

<!-- VOICE MODE -->
<div id="voiceMode" style="display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1">
  <div class="voice-panel">
    <div class="voice-orb-wrap">
      <div class="voice-rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
      <div class="voice-orb" id="voiceOrb" onclick="toggleVoice()">
        <img src="https://media.base44.com/images/public/69d2bb91c971dceaa292f823/17e19110b_generated_image.png" alt="Andrea" id="orbImg"/>
      </div>
    </div>

    <div class="voice-status" id="voiceStatus">Toca para hablar</div>
    <div class="voice-hint" id="voiceHint">Andrea te escucha y responde en voz</div>

    <button class="mic-btn" id="micBtn" onclick="toggleVoice()">
      <svg id="micIcon" viewBox="0 0 24 24">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>

  <!-- Voice transcript log -->
  <div class="messages" id="voiceMsgs" style="flex:0 0 auto;max-height:200px;padding-bottom:16px"></div>
</div>

<!-- CHAT MODE -->
<div id="chatMode" style="display:none;flex-direction:column;flex:1;overflow:hidden">
  <div class="messages" id="chatMsgs">
    <div class="welcome" id="chatWelcome">
      <div class="welcome-orb">
        <img src="https://media.base44.com/images/public/69d2bb91c971dceaa292f823/17e19110b_generated_image.png" alt="Andrea"/>
      </div>
      <h2>Hola, soy <span>Andrea</span></h2>
      <p>Tu asistente inteligente. Escríbeme o cambia a modo Voz para hablar conmigo.</p>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Escríbele a Andrea..." rows="1" maxlength="2000"></textarea>
      <button class="voice-mini-btn" id="miniMic" onclick="quickVoiceInput()" title="Hablar">
        <svg viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" onclick="sendText()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API = "https://api.base44.com/api/apps/69d2bb91c971dceaa292f823/functions/dgtechAgent";
const CLIENT_ID = new URLSearchParams(location.search).get("client") || "guest";
const ROBOT = "https://media.base44.com/images/public/69d2bb91c971dceaa292f823/17e19110b_generated_image.png";

let history = [];
let mode = "voice";
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let busy = false;
let stream = null;

// ── PUTER INIT ──
window.addEventListener("load", () => {
  // Puter loads via script tag, no init needed
  setVoiceStatus("idle");
});

// ── MODE SWITCH ──
function setMode(m) {
  mode = m;
  document.getElementById("voiceMode").style.display = m==="voice" ? "flex" : "none";
  document.getElementById("chatMode").style.display = m==="chat" ? "flex" : "none";
  document.getElementById("btnVoz").classList.toggle("active", m==="voice");
  document.getElementById("btnChat").classList.toggle("active", m==="chat");
}

// ── VOICE STATUS ──
function setVoiceStatus(state, text) {
  const orb = document.getElementById("voiceOrb");
  const status = document.getElementById("voiceStatus");
  const hint = document.getElementById("voiceHint");
  const micBtn = document.getElementById("micBtn");
  const micIcon = document.getElementById("micIcon");

  orb.className = "voice-orb";
  status.className = "voice-status";
  micBtn.className = "mic-btn";

  if(state === "idle") {
    status.textContent = text || "Toca para hablar";
    hint.textContent = "Andrea te escucha y responde en voz";
    micIcon.innerHTML = `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
  } else if(state === "listening") {
    orb.classList.add("listening");
    status.classList.add("listening");
    status.textContent = "Escuchando...";
    hint.textContent = "Habla ahora • Toca para detener";
    micBtn.classList.add("listening");
    micIcon.innerHTML = `<rect x="9" y="9" width="6" height="6" rx="1"/>`;
  } else if(state === "thinking") {
    status.classList.add("thinking");
    status.textContent = "Procesando...";
    hint.textContent = "Andrea está pensando";
  } else if(state === "speaking") {
    orb.classList.add("speaking");
    status.classList.add("speaking");
    status.textContent = "Respondiendo...";
    hint.textContent = "Andrea está hablando";
  }
}

// ── TOGGLE VOICE RECORD ──
async function toggleVoice() {
  if(busy) return;
  if(!isRecording) {
    await startRecording();
  } else {
    await stopRecording();
  }
}

async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });
    audioChunks = [];

    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);
    isRecording = true;
    setVoiceStatus("listening");
  } catch(err) {
    setVoiceStatus("idle", "Permiso de micrófono denegado");
  }
}

function getSupportedMimeType() {
  const types = ["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/mp4"];
  for(const t of types) { if(MediaRecorder.isTypeSupported(t)) return t; }
  return "";
}

async function stopRecording() {
  if(!mediaRecorder) return;
  isRecording = false;
  busy = true;
  setVoiceStatus("thinking");

  mediaRecorder.stop();
  stream.getTracks().forEach(t => t.stop());

  mediaRecorder.onstop = async () => {
    try {
      const mimeType = mediaRecorder.mimeType || "audio/webm";
      const blob = new Blob(audioChunks, { type: mimeType });

      // Convert to base64 data URL
      const dataUrl = await blobToDataUrl(blob);

      // 1. Speech → Text via Puter.js (free, no key needed)
      setVoiceStatus("thinking");
      const transcript = await puter.ai.speech2txt(dataUrl, { language: "es" });
      const userText = (typeof transcript === "string" ? transcript : transcript.text || "").trim();

      if(!userText) {
        setVoiceStatus("idle", "No entendí. Intenta de nuevo");
        busy = false;
        return;
      }

      addVoiceMsg("user", userText);
      history.push({ role: "user", content: userText });

      // 2. Text → AI response via my backend
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userText, history: history.slice(-8), clientId: CLIENT_ID })
      });
      const data = await res.json();
      const reply = data.reply || "Lo siento, hubo un error.";

      history.push({ role: "agent", content: reply });
      if(history.length > 30) history = history.slice(-30);

      addVoiceMsg("agent", reply);

      // 3. Text → Speech via Puter.js (free, no key needed)
      setVoiceStatus("speaking");
      const audio = await puter.ai.txt2speech(reply, { language: "es" });
      audio.play();
      audio.onended = () => {
        setVoiceStatus("idle");
        busy = false;
      };

    } catch(err) {
      console.error(err);
      setVoiceStatus("idle", "Error. Intenta de nuevo");
      busy = false;
    }
  };
}

function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function addVoiceMsg(role, text) {
  const msgs = document.getElementById("voiceMsgs");
  const d = document.createElement("div");
  d.className = `msg ${role}`;
  const short = text.length > 120 ? text.slice(0,120)+"…" : text;
  d.innerHTML = `<div class="bubble">${short}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── QUICK VOICE IN CHAT MODE ──
let miniRecorder = null;
let miniChunks = [];
let miniStream = null;
let miniRecording = false;

async function quickVoiceInput() {
  const btn = document.getElementById("miniMic");
  if(!miniRecording) {
    miniStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    miniRecorder = new MediaRecorder(miniStream, { mimeType: getSupportedMimeType() });
    miniChunks = [];
    miniRecorder.ondataavailable = e => { if(e.data.size>0) miniChunks.push(e.data); };
    miniRecorder.start(100);
    miniRecording = true;
    btn.classList.add("recording");
  } else {
    miniRecording = false;
    btn.classList.remove("recording");
    miniRecorder.stop();
    miniStream.getTracks().forEach(t => t.stop());
    miniRecorder.onstop = async () => {
      try {
        const blob = new Blob(miniChunks, { type: miniRecorder.mimeType || "audio/webm" });
        const dataUrl = await blobToDataUrl(blob);
        const transcript = await puter.ai.speech2txt(dataUrl, { language: "es" });
        const text = (typeof transcript === "string" ? transcript : transcript.text || "").trim();
        if(text) { document.getElementById("userInput").value = text; }
      } catch(e) { console.error(e); }
    };
  }
}

// ── CHAT TEXT ──
const input = document.getElementById("userInput");
input.addEventListener("input", () => { input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,100)+"px"; });
input.addEventListener("keydown", e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendText();} });

const time = () => new Date().toLocaleTimeString("es-DO",{hour:"2-digit",minute:"2-digit"});

function addChatMsg(role, text) {
  document.getElementById("chatWelcome").style.display = "none";
  const msgs = document.getElementById("chatMsgs");
  const d = document.createElement("div");
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="bubble">${text.replace(/\n/g,"<br/>")}</div><div class="msg-time">${time()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("chatMsgs");
  const d = document.createElement("div");
  d.className="msg agent";d.id="typing";
  d.innerHTML=`<div class="typing-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){const t=document.getElementById("typing");if(t)t.remove();}

async function sendText() {
  const text = input.value.trim();
  if(!text||busy) return;
  busy=true;input.value="";input.style.height="auto";
  document.getElementById("sendBtn").disabled=true;
  addChatMsg("user",text);showTyping();
  history.push({role:"user",content:text});
  try{
    const r = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,history:history.slice(-10),clientId:CLIENT_ID})});
    const d = await r.json();
    removeTyping();
    const reply = d.reply||"Lo siento, hubo un error.";
    addChatMsg("agent",reply);
    history.push({role:"agent",content:reply});
    if(history.length>40)history=history.slice(-40);
  }catch(e){removeTyping();addChatMsg("agent","⚠️ Error de conexión.");}
  busy=false;document.getElementById("sendBtn").disabled=false;input.focus();
}

// ── PWA SERVICE WORKER ──
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
